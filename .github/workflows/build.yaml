on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '25'

    - name: Install dependencies
      run: |
        npm install
    
    - name: Change wrapper permissions
      run: cd android && chmod +x ./gradlew && cd ..

    - name: Build the app
      run: |
        npm run build-debug:android
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-app
        path: android/app/build/outputs/apk/release/app-debug.apk