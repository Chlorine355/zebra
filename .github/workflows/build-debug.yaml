on:
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '25'

    - name: Install dependencies
      run: |
        npm install
        npm prune --omit=dev
    
    - name: Change wrapper permissions
      run: cd android && chmod +x ./gradlew && cd ..

    - name: Build the app
      run: |
        npm run build-debug:android
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zebra-release
        path: android/app/build/outputs/apk/debug/app-release.apk